---
name: CI Workflow

on:
  push:
    branches:
      - main

jobs:
  super-lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Run Super Linter
        uses: github/super-linter@v4
        env:
          RUN_LOCAL: true
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  docker:
    needs: [super-lint]
    runs-on: ubuntu-latest
    # CRITICAL: This maps your GitHub Secrets so the shell can use them
    env:
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v1

      - name: Cache Docker layers
        uses: actions/cache@v3
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-buildx-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-buildx-

      - name: Build and Push to Docker Hub
        run: |
          # Login using the mapped environment variables
          echo "$DOCKERHUB_TOKEN" | docker login -u "$DOCKERHUB_USERNAME" --password-stdin
          
          docker build -t "$DOCKERHUB_USERNAME/kiii:latest" -t "$DOCKERHUB_USERNAME/kiii:${{ github.sha }}" .
          
          docker push "$DOCKERHUB_USERNAME/kiii" --all-tags